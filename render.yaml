services:
  - type: web
    name: technology-cuchito-backend
    runtime: node
    plan: free
    region: oregon
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter=technology-cuchito-backend build
    startCommand: pnpm --filter=technology-cuchito-backend start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: technology-cuchito-db
          property: connectionString
      - key: DB_SSL
        value: "false"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: technology-cuchito-redis
          property: connectionString
      - key: CORS_ORIGIN
        value: https://technology-cuchito-frontend.onrender.com
      - key: RATE_LIMIT_AUTH_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_AUTH_MAX
        value: "30"
      - key: RATE_LIMIT_API_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_API_MAX
        value: "50000"

  - type: web
    name: technology-cuchito-frontend
    runtime: static
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter=technology-cuchito-frontend build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://technology-cuchito-backend.onrender.com/api
      - key: VITE_NODE_ENV
        value: production
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: keyvalue
    name: technology-cuchito-redis
    plan: free
    region: oregon
    ipAllowList: []

databases:
  - name: technology-cuchito-db
    plan: free
    region: oregon
