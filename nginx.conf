# Nginx Load Balancer Configuration
# Para soportar 100,000 RPS necesitas múltiples servidores backend

# Optimización de workers
worker_processes auto;  # Un worker por core
worker_rlimit_nofile 100000;

events {
    worker_connections 10000;  # Conexiones por worker
    use epoll;  # Linux optimizado
    multi_accept on;
}

http {
    # ==================================
    # OPTIMIZACIONES GENERALES
    # ==================================

    # Timeouts optimizados
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 65;
    send_timeout 10;
    keepalive_requests 100;

    # Buffers optimizados
    client_body_buffer_size 128k;
    client_max_body_size 10m;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;
    output_buffers 1 32k;
    postpone_output 1460;

    # TCP optimizations
    tcp_nopush on;
    tcp_nodelay on;
    sendfile on;

    # Compresión (reduce ancho de banda en 70%)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;

    # Cache de archivos estáticos
    open_file_cache max=10000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # Logging optimizado
    access_log /var/log/nginx/access.log combined buffer=32k flush=5s;
    error_log /var/log/nginx/error.log warn;

    # ==================================
    # UPSTREAM SERVERS
    # ==================================

    # Pool de servidores backend API
    upstream api_backend {
        # Estrategia de balanceo
        least_conn;  # Envía a servidor con menos conexiones

        # Servidores backend (escalar horizontalmente)
        # En producción, tendrías múltiples servidores físicos
        server 127.0.0.1:3000 max_fails=3 fail_timeout=30s weight=10;
        server 127.0.0.1:3001 max_fails=3 fail_timeout=30s weight=10;
        server 127.0.0.1:3002 max_fails=3 fail_timeout=30s weight=10;
        server 127.0.0.1:3003 max_fails=3 fail_timeout=30s weight=10;

        # Backup server
        server 127.0.0.1:3004 backup;

        # Keep-alive hacia backend
        keepalive 64;
        keepalive_requests 100;
        keepalive_timeout 60s;
    }

    # ==================================
    # RATE LIMITING
    # ==================================

    # Zone para rate limiting (10MB = ~160,000 IPs)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;

    # Zone para limitar conexiones concurrentes
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ==================================
    # CACHE
    # ==================================

    # Path para cache (100MB = ~8000 responses)
    proxy_cache_path /var/cache/nginx/api
                     levels=1:2
                     keys_zone=api_cache:10m
                     max_size=100m
                     inactive=60m
                     use_temp_path=off;

    # ==================================
    # SERVIDOR PRINCIPAL
    # ==================================

    server {
        listen 80 default_server reuseport;
        listen [::]:80 default_server reuseport;

        server_name api.inventory.com;

        # Límite de conexiones concurrentes por IP
        limit_conn conn_limit 20;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ==================================
        # HEALTH CHECK
        # ==================================

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ==================================
        # NGINX STATUS (solo localhost)
        # ==================================

        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            deny all;
        }

        # ==================================
        # API ENDPOINTS
        # ==================================

        # Auth endpoints (rate limit más restrictivo)
        location ~ ^/api/auth/(login|register) {
            # Rate limiting
            limit_req zone=auth_limit burst=20 nodelay;

            # No cache para auth
            add_header Cache-Control "no-store, no-cache, must-revalidate";

            # Proxy
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;

            # Buffering
            proxy_buffering off;
        }

        # API general
        location /api/ {
            # Rate limiting (más permisivo)
            limit_req zone=api_limit burst=50 nodelay;

            # Cache para GET requests
            proxy_cache api_cache;
            proxy_cache_valid 200 5m;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;
            proxy_cache_lock on;
            proxy_cache_methods GET HEAD;
            proxy_cache_bypass $http_pragma $http_authorization;
            add_header X-Cache-Status $upstream_cache_status;

            # Proxy
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;

            # Retry
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
        }

        # ==================================
        # FRONTEND ESTÁTICO
        # ==================================

        location / {
            root /var/www/inventory/frontend;
            index index.html;
            try_files $uri $uri/ /index.html;

            # Cache agresivo para assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }

            # No cache para HTML
            location ~* \.html$ {
                expires -1;
                add_header Cache-Control "no-store, no-cache, must-revalidate";
            }
        }
    }

    # ==================================
    # HTTPS (SSL/TLS)
    # ==================================

    server {
        listen 443 ssl http2 reuseport;
        listen [::]:443 ssl http2 reuseport;

        server_name api.inventory.com;

        # Certificados SSL (usar Let's Encrypt)
        ssl_certificate /etc/letsencrypt/live/api.inventory.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.inventory.com/privkey.pem;

        # SSL optimizado
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;

        # SSL session cache
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # OCSP stapling
        ssl_stapling on;
        ssl_stapling_verify on;

        # Security headers adicionales para HTTPS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Resto de configuración igual que HTTP
        include /etc/nginx/api-locations.conf;
    }

    # Redirect HTTP a HTTPS
    server {
        listen 80;
        listen [::]:80;
        server_name api.inventory.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$server_name$request_uri;
        }
    }
}

# ==================================
# STREAM (TCP Load Balancing)
# ==================================

# Para balanceo de PostgreSQL read replicas
stream {
    upstream postgres_read {
        least_conn;
        server 10.0.1.10:5432 max_fails=3 fail_timeout=30s;
        server 10.0.1.11:5432 max_fails=3 fail_timeout=30s;
        server 10.0.1.12:5432 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 5433;
        proxy_pass postgres_read;
        proxy_connect_timeout 1s;
    }
}

# ==================================
# COMANDOS ÚTILES
# ==================================

# Verificar configuración:
# nginx -t

# Recargar sin downtime:
# nginx -s reload

# Ver estadísticas:
# curl http://localhost/nginx_status

# Ver caché activo:
# ls -lah /var/cache/nginx/api/

# Limpiar caché:
# rm -rf /var/cache/nginx/api/*

